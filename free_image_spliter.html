<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>自由裁剪tool-柔和</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js">
    </script>
    <style>
        /* ===== 全局重置 & 柔和基调 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-main: #f5f0f7;
            --bg-panel: #faf8fc;
            --bg-card: #ffffff;
            --bg-toolbar: #faf8fc;
            --bg-sidebar: #faf8fc;
            --bg-canvas: #f0ecf3;
            --bg-status: #f5f0f7;

            --primary: #b8a9c9;
            --primary-light: #d5cbe0;
            --primary-dark: #9a88af;
            --blue-morandi: #a8c4d6;
            --blue-light: #c9dce8;
            --orange-macaron: #fad6c5;
            --orange-light: #fce8dd;
            --orange-dark: #e8b89f;

            --text-primary: #3d3a47;
            --text-secondary: #7a7288;
            --text-light: #b5aec4;

            --shadow-sm: 0 2px 8px rgba(120, 100, 140, 0.08);
            --shadow-md: 0 4px 20px rgba(120, 100, 140, 0.12);
            --shadow-lg: 0 8px 40px rgba(120, 100, 140, 0.16);
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-xl: 20px;

            --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        html,
        body {
            height: 100%;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
            background: var(--bg-main);
            color: var(--text-primary);
            overflow: hidden;
            user-select: none;
        }

        /* ===== 滚动条美化 ===== */
        ::-webkit-scrollbar {
            width: 5px;
            height: 5px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--primary-light);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--primary);
        }

        /* ===== 应用容器 ===== */
        .app {
            display: flex;
            flex-direction: column;
            height: 100vh;
            background: var(--bg-main);
        }

        /* ===== 顶部工具栏 ===== */
        .toolbar {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 18px;
            background: var(--bg-toolbar);
            border-bottom: 1px solid rgba(180, 160, 200, 0.2);
            flex-wrap: wrap;
            min-height: 52px;
            backdrop-filter: blur(6px);
            flex-shrink: 0;
        }

        .toolbar .group {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 0 4px;
            position: relative;
        }
        .toolbar .group::after {
            content: '';
            position: absolute;
            right: -4px;
            top: 20%;
            height: 60%;
            width: 1px;
            background: rgba(180, 160, 200, 0.25);
        }
        .toolbar .group:last-child::after {
            display: none;
        }

        .toolbar .group-label {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-secondary);
            letter-spacing: 0.3px;
            padding: 0 6px 0 2px;
            opacity: 0.7;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            padding: 5px 13px;
            border: none;
            border-radius: var(--radius-sm);
            background: transparent;
            color: var(--text-secondary);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
            white-space: nowrap;
            line-height: 1.4;
            position: relative;
        }
        .btn:hover {
            background: rgba(180, 160, 200, 0.12);
            color: var(--text-primary);
        }
        .btn:active {
            transform: scale(0.96);
        }

        .btn.active {
            background: var(--primary);
            color: #fff;
            box-shadow: 0 2px 8px rgba(184, 168, 201, 0.35);
        }
        .btn.active:hover {
            background: var(--primary-dark);
            box-shadow: 0 4px 12px rgba(184, 168, 201, 0.4);
        }

        .btn.orange {
            background: var(--orange-macaron);
            color: #6b4c3a;
        }
        .btn.orange:hover {
            background: var(--orange-dark);
            color: #fff;
        }
        .btn.orange.active {
            background: var(--orange-dark);
            color: #fff;
            box-shadow: 0 2px 10px rgba(232, 184, 159, 0.4);
        }

        .btn.blue {
            background: var(--blue-morandi);
            color: #fff;
        }
        .btn.blue:hover {
            background: #94b5ca;
            box-shadow: 0 2px 10px rgba(168, 196, 214, 0.4);
        }

        .btn.purple {
            background: var(--primary);
            color: #fff;
        }
        .btn.purple:hover {
            background: var(--primary-dark);
            box-shadow: 0 2px 10px rgba(184, 168, 201, 0.4);
        }

        .btn.green {
            background: #b8d4c5;
            color: #3a5a4a;
        }
        .btn.green:hover {
            background: #a0c4b3;
            color: #fff;
        }

        .btn.red {
            background: #f0cdd0;
            color: #7a4a4f;
        }
        .btn.red:hover {
            background: #e8b8bd;
            color: #fff;
        }

        .btn.dark-red {
            background: #e8b8bd;
            color: #5a3a3f;
        }
        .btn.dark-red:hover {
            background: #dba0a7;
            color: #fff;
        }

        .btn.teal {
            background: #b8d4d0;
            color: #3a5a56;
        }
        .btn.teal:hover {
            background: #a0c4bf;
            color: #fff;
        }

        .btn .icon {
            font-size: 15px;
            line-height: 1;
        }

        .toolbar .sep {
            color: rgba(180, 160, 200, 0.25);
            font-size: 18px;
            font-weight: 100;
            padding: 0 2px;
        }

        .line-width-control {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: var(--text-secondary);
        }
        .line-width-control input[type="range"] {
            width: 56px;
            height: 4px;
            -webkit-appearance: none;
            appearance: none;
            background: var(--primary-light);
            border-radius: 4px;
            outline: none;
        }
        .line-width-control input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: var(--primary);
            cursor: pointer;
            box-shadow: 0 1px 4px rgba(120, 100, 140, 0.2);
        }
        .line-width-control input[type="range"]::-moz-range-thumb {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: var(--primary);
            border: none;
            cursor: pointer;
        }
        .line-width-control #lineWidthVal {
            font-weight: 600;
            color: var(--text-primary);
            min-width: 18px;
            text-align: center;
        }

        .zoom-label {
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
            margin-left: auto;
            padding: 0 6px;
            background: rgba(180, 160, 200, 0.08);
            border-radius: var(--radius-sm);
            padding: 2px 12px;
            letter-spacing: 0.2px;
        }

        /* ===== 主体 ===== */
        .main-body {
            flex: 1;
            display: flex;
            overflow: hidden;
            gap: 0;
        }

        /* ===== 侧边栏 ===== */
        .sidebar {
            width: 170px;
            min-width: 170px;
            background: var(--bg-sidebar);
            border-right: 1px solid rgba(180, 160, 200, 0.15);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            flex-shrink: 0;
        }

        .sidebar-header {
            padding: 14px 16px 10px;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid rgba(180, 160, 200, 0.1);
        }
        .sidebar-header .count {
            background: var(--primary);
            color: #fff;
            font-size: 11px;
            font-weight: 600;
            padding: 1px 10px;
            border-radius: 20px;
            letter-spacing: 0.3px;
        }

        .image-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px 10px 6px;
        }

        .image-card {
            position: relative;
            border-radius: var(--radius-md);
            overflow: hidden;
            margin-bottom: 10px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: var(--transition);
            background: var(--bg-card);
            box-shadow: var(--shadow-sm);
        }
        .image-card:hover {
            border-color: var(--primary-light);
            box-shadow: var(--shadow-md);
            transform: translateY(-1px);
        }
        .image-card.active {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(184, 168, 201, 0.2), var(--shadow-md);
        }
        .image-card canvas {
            width: 100%;
            display: block;
            background: #f5f0f7;
        }
        .image-card .card-info {
            padding: 8px 10px 8px;
            background: var(--bg-card);
        }
        .image-card .card-name {
            color: var(--text-primary);
            font-size: 12px;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .image-card .card-status {
            color: var(--text-light);
            font-size: 10px;
            margin-top: 2px;
            font-weight: 400;
        }
        .image-card .card-badge {
            position: absolute;
            top: 6px;
            right: 6px;
            background: var(--orange-macaron);
            color: #6b4c3a;
            font-size: 10px;
            font-weight: 700;
            padding: 1px 8px;
            border-radius: 20px;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.06);
        }
        .image-card .card-remove {
            position: absolute;
            top: 6px;
            left: 6px;
            background: rgba(200, 150, 155, 0.85);
            color: #fff;
            border: none;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            font-size: 12px;
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
            line-height: 1;
            transition: var(--transition);
            backdrop-filter: blur(4px);
        }
        .image-card .card-remove:hover {
            background: rgba(200, 130, 135, 0.95);
            transform: scale(1.05);
        }
        .image-card:hover .card-remove {
            display: flex;
        }

        .sidebar-footer {
            padding: 10px 12px 14px;
            border-top: 1px solid rgba(180, 160, 200, 0.1);
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .sidebar-footer .btn {
            width: 100%;
            justify-content: center;
            font-size: 13px;
            padding: 7px 12px;
            border-radius: var(--radius-sm);
        }

        /* ===== 画布区域 ===== */
        .canvas-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
            background: var(--bg-canvas);
        }

        .canvas-wrap {
            flex: 1;
            overflow: auto;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-canvas);
            position: relative;
            background-image:
                radial-gradient(circle at 20px 20px, rgba(180, 160, 200, 0.06) 1px, transparent 1px);
            background-size: 40px 40px;
        }
        .canvas-wrap.drag-over {
            outline: 3px dashed var(--primary);
            outline-offset: -8px;
            background: rgba(184, 168, 201, 0.06);
        }

        canvas#mainCanvas {
            display: block;
            cursor: crosshair;
            border-radius: var(--radius-sm);
            box-shadow: var(--shadow-md);
            background: #fff;
            image-rendering: auto;
        }
        canvas#mainCanvas.panning {
            cursor: grab;
        }
        canvas#mainCanvas.panning-active {
            cursor: grabbing;
        }

        .empty-state {
            color: var(--text-light);
            font-size: 17px;
            text-align: center;
            line-height: 2;
            padding: 40px;
            background: rgba(255, 255, 255, 0.4);
            border-radius: var(--radius-lg);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.6);
        }
        .empty-state .big-icon {
            font-size: 48px;
            display: block;
            margin-bottom: 12px;
        }
        .empty-state .sub {
            font-size: 14px;
            color: var(--text-light);
        }

        /* ===== 浮动面板 ===== */
        .float-panel {
            position: absolute;
            right: 24px;
            top: 24px;
            background: rgba(255, 252, 255, 0.92);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(184, 168, 201, 0.2);
            border-radius: var(--radius-lg);
            padding: 16px 20px 18px;
            box-shadow: var(--shadow-lg);
            display: none;
            z-index: 100;
            min-width: 220px;
            transition: var(--transition);
        }
        .float-panel.show {
            display: block;
            animation: floatIn 0.3s ease-out;
        }
        @keyframes floatIn {
            from {
                opacity: 0;
                transform: translateY(-8px) scale(0.96);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }
        .float-panel .panel-title {
            color: var(--primary-dark);
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .float-panel .panel-title .icon {
            font-size: 18px;
        }
        .float-panel .panel-hint {
            color: var(--text-secondary);
            font-size: 12px;
            line-height: 1.6;
            margin-bottom: 12px;
            padding: 8px 12px;
            background: rgba(184, 168, 201, 0.06);
            border-radius: var(--radius-sm);
        }
        .float-panel .panel-btns {
            display: flex;
            gap: 8px;
        }
        .float-panel .panel-btns .btn {
            flex: 1;
            text-align: center;
            justify-content: center;
            padding: 7px 12px;
            font-size: 13px;
            border-radius: var(--radius-sm);
        }
        .float-panel .panel-btns .btn.confirm {
            background: var(--primary);
            color: #fff;
        }
        .float-panel .panel-btns .btn.confirm:hover {
            background: var(--primary-dark);
        }
        .float-panel .panel-btns .btn.cancel {
            background: rgba(200, 150, 155, 0.2);
            color: var(--text-secondary);
        }
        .float-panel .panel-btns .btn.cancel:hover {
            background: rgba(200, 150, 155, 0.35);
        }

        /* ===== 导出遮罩 ===== */
        .export-overlay {
            position: fixed;
            inset: 0;
            background: rgba(60, 50, 70, 0.6);
            backdrop-filter: blur(6px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 999;
            animation: fadeIn 0.3s ease-out;
        }
        .export-overlay.show {
            display: flex;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .export-box {
            background: var(--bg-card);
            padding: 32px 48px 36px;
            border-radius: var(--radius-lg);
            text-align: center;
            min-width: 340px;
            box-shadow: var(--shadow-lg);
            animation: scaleIn 0.3s ease-out;
        }
        @keyframes scaleIn {
            from {
                opacity: 0;
                transform: scale(0.92);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }
        .export-box .export-icon {
            font-size: 40px;
            display: block;
            margin-bottom: 10px;
        }
        .export-box .export-title {
            font-size: 17px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 4px;
        }
        .export-box .export-sub {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 16px;
        }
        .export-box .progress-bar {
            width: 100%;
            height: 6px;
            background: rgba(184, 168, 201, 0.2);
            border-radius: 6px;
            overflow: hidden;
            margin-top: 4px;
        }
        .export-box .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--blue-morandi));
            border-radius: 6px;
            transition: width 0.3s ease;
            width: 0%;
        }

        /* ===== 状态栏 ===== */
        .statusbar {
            padding: 7px 20px;
            background: var(--bg-status);
            border-top: 1px solid rgba(180, 160, 200, 0.12);
            font-size: 12px;
            color: var(--text-secondary);
            flex-shrink: 0;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .statusbar .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--primary);
            display: inline-block;
            flex-shrink: 0;
        }
        .statusbar .status-dot.ready {
            background: #b8d4c5;
        }
        .statusbar .status-dot.working {
            background: var(--orange-macaron);
            animation: pulse 1s ease-in-out infinite;
        }
        @keyframes pulse {
            0%,
            100% {
                opacity: 1;
                transform: scale(1);
            }
            50% {
                opacity: 0.5;
                transform: scale(0.85);
            }
        }

        /* ===== 响应式 ===== */
        @media (max-width: 820px) {
            .sidebar {
                width: 130px;
                min-width: 130px;
            }
            .toolbar {
                padding: 6px 10px;
                gap: 4px;
            }
            .toolbar .group-label {
                font-size: 10px;
                padding: 0 3px;
            }
            .btn {
                font-size: 12px;
                padding: 4px 9px;
            }
            .btn .icon {
                font-size: 13px;
            }
            .float-panel {
                right: 12px;
                top: 12px;
                min-width: 180px;
                padding: 14px 16px;
            }
            .export-box {
                min-width: 280px;
                padding: 24px 28px;
            }
            .zoom-label {
                font-size: 11px;
                padding: 0 8px;
            }
        }

        @media (max-width: 600px) {
            .sidebar {
                width: 100px;
                min-width: 100px;
            }
            .sidebar-header {
                font-size: 11px;
                padding: 10px 10px 8px;
            }
            .image-card .card-info {
                padding: 4px 6px;
            }
            .image-card .card-name {
                font-size: 10px;
            }
            .toolbar .group::after {
                display: none;
            }
            .toolbar {
                gap: 2px;
            }
            .btn {
                font-size: 11px;
                padding: 3px 7px;
            }
            .line-width-control input[type="range"] {
                width: 40px;
            }
            .line-width-control {
                font-size: 11px;
            }
            .float-panel {
                right: 8px;
                top: 8px;
                min-width: 150px;
                padding: 10px 12px;
            }
            .float-panel .panel-hint {
                font-size: 11px;
                padding: 4px 8px;
            }
            .export-box {
                min-width: 220px;
                padding: 20px 20px;
            }
            .statusbar {
                font-size: 11px;
                padding: 4px 12px;
            }
        }
    </style>
</head>
<body>

    <div class="app">
        <!-- ===== 工具栏 ===== -->
        <div class="toolbar">
            <div class="group">
                <span class="group-label">🎂 定蛋糕</span>
                <button class="btn active" id="btnRect" data-tool="rect">
                    <span class="icon">▭</span> 矩形
                </button>
                <button class="btn" id="btnCircle" data-tool="circle">
                    <span class="icon">◯</span> 圆形
                </button>
                <button class="btn" id="btnLasso" data-tool="lasso">
                    <span class="icon">✧</span> 套索
                </button>
            </div>

            <div class="group">
                <span class="group-label">💡 切蛋糕</span>
                <button class="btn" id="btnLine" data-tool="line">
                    <span class="icon">╱</span> 直线
                </button>
                <button class="btn" id="btnCurve" data-tool="curve">
                    <span class="icon">〰</span> 曲线
                </button>
                <button class="btn" id="btnEraser" data-tool="eraser">
                    <span class="icon">=</span> 橡皮
                </button>
                <div class="line-width-control">
                    <label style="font-size:12px;color:var(--text-secondary);">刀宽</label>
                    <input type="range" id="lineWidth" min="1" max="20" value="3">
                    <span id="lineWidthVal">3</span>
                </div>
            </div>

            <div class="group">
                <button class="btn orange" id="btnCut">
                    <span class="icon">⚡</span> 执行分割
                </button>
                <button class="btn red" id="btnUndoCut">
                    <span class="icon">↩</span> 撤销
                </button>
                <button class="btn dark-red" id="btnClearAll">
                    <span class="icon">✕</span> 清空
                </button>
            </div>

            <div class="group" style="border-right:none;">
                <button class="btn green" id="btnExportDirect">
                    <span class="icon">⬇</span> 直接导出
                </button>
                <button class="btn purple" id="btnExportZip">
                    <span class="icon">📎</span> ZIP打包
                </button>
            </div>

            <span class="zoom-label" id="zoomLabel">🔍 100%</span>
        </div>

        <!-- ===== 主体 ===== -->
        <div class="main-body">
            <!-- 侧边栏 -->
            <div class="sidebar">
                <div class="sidebar-header">
                    <span>🗂 图片列表</span>
                    <span class="count" id="imageCount">0</span>
                </div>
                <div class="image-list" id="imageList"></div>
                <div class="sidebar-footer">
                    <button class="btn blue" id="btnAddImages">
                        <span class="icon">＋</span> 添加图片
                    </button>
                    <button class="btn teal" id="btnFitView">
                        <span class="icon">⊡</span> 适配视图
                    </button>
                    <input type="file" id="fileInput" accept="image/*" multiple style="display:none">
                </div>
            </div>

            <!-- 画布 -->
            <div class="canvas-area">
                <div class="canvas-wrap" id="canvasWrap">
                    <div class="empty-state" id="emptyState">
                        <span class="big-icon">🫧</span>
                        点击左下角「添加图片」<br> 或直接拖放图片到此处
                        <span class="sub"> <br>支持多选·沉浸式切割·导出png/zip</span>
                    </div>
                    <canvas id="mainCanvas" style="display:none;"></canvas>
                </div>

                <!-- 浮动面板 -->
                <div class="float-panel" id="floatPanel">
                    <div class="panel-title">
                        <span class="icon" id="panelIcon">📐</span>
                        <span id="panelTitleText">调整模式</span>
                    </div>
                    <div class="panel-hint" id="panelHint">拖拽白色控制点调整大小，拖拽内部移动位置。</div>
                    <div class="panel-btns">
                        <button class="btn confirm" id="btnConfirmShape">✅ 确认</button>
                        <button class="btn cancel" id="btnCancelShape">✕ 取消</button>
                    </div>
                </div>

                <div class="statusbar" id="statusBar">
                    <span class="status-dot ready" id="statusDot"></span>
                    <span id="statusText">就绪 · 提示：按住 <kbd>Space</kbd>+拖动平移画布，滚轮缩放</span>
                </div>
            </div>
        </div>

        <!-- 导出遮罩 -->
        <div class="export-overlay" id="exportOverlay">
            <div class="export-box">
                <span class="export-icon" id="exportIcon">📎</span>
                <div class="export-title" id="exportTitle">正在导出...</div>
                <div class="export-sub" id="exportSub">请稍候</div>
                <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
            </div>
        </div>
    </div>

    <script>
        // ============================================================
        //  完整保留原功能，仅适配新 UI 的 DOM 引用
        // ============================================================
        (() => {
            const canvas = document.getElementById('mainCanvas');
            const ctx = canvas.getContext('2d', { willReadFrequently: true });
            const wrap = document.getElementById('canvasWrap');
            const statusText = document.getElementById('statusText');
            const statusDot = document.getElementById('statusDot');
            const zoomLabel = document.getElementById('zoomLabel');
            const emptyState = document.getElementById('emptyState');
            const imageListEl = document.getElementById('imageList');
            const imageCountEl = document.getElementById('imageCount');
            const floatPanel = document.getElementById('floatPanel');
            const panelIcon = document.getElementById('panelIcon');
            const panelTitleText = document.getElementById('panelTitleText');
            const panelHint = document.getElementById('panelHint');
            const progressFill = document.getElementById('progressFill');
            const exportTitle = document.getElementById('exportTitle');
            const exportSub = document.getElementById('exportSub');
            const exportIcon = document.getElementById('exportIcon');

            let images = [];
            let activeIdx = -1;
            let scale = 1.0;
            let tool = 'rect';
            let lineWidth = 3;

            let pendingBoundary = null;
            let pendingCut = null;
            let dragMode = null;
            let dragStartMouse = null;
            let dragStartShape = null;
            let currentCut = null;

            let isSpaceDown = false;
            let isPanning = false;
            let panStartX = 0,
                panStartY = 0;
            let scrollStartLeft = 0,
                scrollStartTop = 0;

            function cur() { return activeIdx >= 0 && activeIdx < images.length ? images[activeIdx] : null; }

            // ===== 状态栏 =====
            function setStatus(msg, type) {
                statusText.textContent = msg;
                if (type === 'working') {
                    statusDot.className = 'status-dot working';
                } else if (type === 'ready') {
                    statusDot.className = 'status-dot ready';
                } else {
                    statusDot.className = 'status-dot';
                }
            }
            setStatus('就绪 · 提示：按住 Space+拖动平移画布，滚轮缩放', 'ready');

            // ===== 适配视图 =====
            function fitToView() {
                const c = cur();
                if (!c) return;
                const wrapRect = wrap.getBoundingClientRect();
                const padding = 60;
                const availW = wrapRect.width - padding * 2;
                const availH = wrapRect.height - padding * 2;
                if (availW <= 0 || availH <= 0) return;

                const scaleX = availW / c.img.width;
                const scaleY = availH / c.img.height;
                scale = Math.min(scaleX, scaleY, 1.0);
                scale = Math.max(0.05, scale);
                applyScale();

                requestAnimationFrame(() => {
                    wrap.scrollLeft = (canvas.offsetWidth - wrapRect.width) / 2;
                    wrap.scrollTop = (canvas.offsetHeight - wrapRect.height) / 2;
                });
            }

            let resizeTimer = null;
            window.addEventListener('resize', () => {
                clearTimeout(resizeTimer);
                resizeTimer = setTimeout(() => {
                    if (cur()) fitToView();
                }, 200);
            });

            document.getElementById('btnFitView').onclick = () => {
                fitToView();
                setStatus('已适配视图', 'ready');
            };

            // ===== 浮动面板 =====
            function showFloatPanel(type) {
                if (type === 'boundary') {
                    panelIcon.textContent = '📐';
                    panelTitleText.textContent = '调整边界';
                    panelHint.textContent = '拖拽白色控制点调整大小，拖拽内部移动位置。';
                } else if (type === 'cut') {
                    panelIcon.textContent = '📏';
                    panelTitleText.textContent = '调整切割线';
                    panelHint.textContent = '拖拽两端白色控制点调整角度/长度，拖拽线段中间可整体移动。';
                }
                floatPanel.classList.add('show');
            }

            function hideFloatPanel() { floatPanel.classList.remove('show'); }

            // ===== 缩放 =====
            function applyScale() {
                const c = cur();
                if (!c) return;
                canvas.style.width = (c.img.width * scale) + 'px';
                canvas.style.height = (c.img.height * scale) + 'px';
                zoomLabel.textContent = `🔍 ${Math.round(scale * 100)}%`;
            }

            wrap.addEventListener('wheel', (e) => {
                e.preventDefault();
                const c = cur();
                if (!c) return;
                const rect = canvas.getBoundingClientRect();
                const mx = (e.clientX - rect.left) / scale;
                const my = (e.clientY - rect.top) / scale;
                let delta = -e.deltaY;
                if (e.deltaMode === 1 || e.ctrlKey) delta *= 0.01;
                else delta *= 0.05;
                delta = Math.max(-0.5, Math.min(0.5, delta));
                scale = Math.max(0.05, Math.min(10, scale * Math.exp(delta)));
                applyScale();
                const newRect = canvas.getBoundingClientRect();
                wrap.scrollLeft += (mx * scale - (e.clientX - newRect.left));
                wrap.scrollTop += (my * scale - (e.clientY - newRect.top));
                redraw();
            }, { passive: false });

            window.addEventListener('keydown', (e) => {
                if (e.code === 'Space' && !e.repeat) { isSpaceDown = true;
                    if (!isPanning) canvas.classList.add('panning');
                    e.preventDefault(); }
                if (e.key === 'Enter') confirmPending();
                else if (e.key === 'Escape') cancelPending();
                else if ((e.ctrlKey || e.metaKey) && e.key === 'z') { e.preventDefault();
                    undoCut(); }
            });
            window.addEventListener('keyup', (e) => {
                if (e.code === 'Space') { isSpaceDown = false;
                    isPanning = false;
                    canvas.classList.remove('panning', 'panning-active'); }
            });

            // ===== 图片管理 =====
            function addImages(fileList) {
                let loaded = 0;
                const total = fileList.length;
                for (const file of fileList) {
                    if (!file.type.startsWith('image/')) continue;
                    const newImg = new Image();
                    const objUrl = URL.createObjectURL(file);
                    newImg.onload = () => {
                        images.push({
                            name: file.name,
                            img: newImg,
                            objUrl,
                            boundary: null,
                            boundaryMask: null,
                            boundaryOverlay: null,
                            cuts: [],
                            regions: [],
                            regionOverlay: null
                        });
                        loaded++;
                        renderImageList();
                        if (images.length === 1) switchImage(0);
                        if (loaded === total && total > 1) setStatus(`已批量加载 ${total} 张图片`, 'ready');
                    };
                    newImg.src = objUrl;
                }
            }

            function removeImage(idx) {
                if (idx < 0 || idx >= images.length) return;
                URL.revokeObjectURL(images[idx].objUrl);
                images.splice(idx, 1);
                renderImageList();
                if (images.length === 0) {
                    activeIdx = -1;
                    canvas.style.display = 'none';
                    emptyState.style.display = 'flex';
                    hideFloatPanel();
                    pendingBoundary = null;
                    pendingCut = null;
                    currentCut = null;
                    setStatus('暂无图片，请添加', 'ready');
                } else if (activeIdx >= images.length) switchImage(images.length - 1);
                else if (activeIdx === idx) switchImage(Math.min(idx, images.length - 1));
                else if (activeIdx > idx) { activeIdx--;
                    renderImageList(); }
            }

            function switchImage(idx) {
                if (idx < 0 || idx >= images.length) return;
                pendingBoundary = null;
                pendingCut = null;
                currentCut = null;
                dragMode = null;
                activeIdx = idx;
                const c = cur();
                canvas.width = c.img.width;
                canvas.height = c.img.height;
                canvas.style.display = 'block';
                emptyState.style.display = 'none';
                hideFloatPanel();

                fitToView();
                redraw();
                renderImageList();
                const rc = c.regions.length,
                    cc = c.cuts.length;
                let st = `当前：${c.name} (${c.img.width}×${c.img.height})`;
                if (rc > 0) st += ` · 已分割 ${rc} 块`;
                else if (c.boundary) st += ` · 已划定边界，${cc} 条切割线`;
                setStatus(st, 'ready');
            }

            function renderImageList() {
                imageCountEl.textContent = images.length;
                imageListEl.innerHTML = '';
                images.forEach((item, idx) => {
                    const card = document.createElement('div');
                    card.className = 'image-card' + (idx === activeIdx ? ' active' : '');
                    const thumb = document.createElement('canvas');
                    const maxW = 144,
                        maxH = 100;
                    const ratio = Math.min(maxW / item.img.width, maxH / item.img.height);
                    thumb.width = Math.round(item.img.width * ratio);
                    thumb.height = Math.round(item.img.height * ratio);
                    const tc = thumb.getContext('2d');
                    tc.drawImage(item.img, 0, 0, thumb.width, thumb.height);
                    if (item.regions.length > 0) { tc.fillStyle = 'rgba(184,168,201,0.25)';
                        tc.fillRect(0, 0, thumb.width, thumb.height); }
                    card.appendChild(thumb);
                    const info = document.createElement('div');
                    info.className = 'card-info';
                    const nameEl = document.createElement('div');
                    nameEl.className = 'card-name';
                    nameEl.textContent = item.name;
                    nameEl.title = item.name;
                    info.appendChild(nameEl);
                    const statusEl = document.createElement('div');
                    statusEl.className = 'card-status';
                    if (item.regions.length > 0) statusEl.textContent = `✅ 已分割 ${item.regions.length} 块`;
                    else if (item.boundary) statusEl.textContent = `🟢 已划定边界`;
                    else statusEl.textContent = '⚪ 未处理';
                    info.appendChild(statusEl);
                    card.appendChild(info);
                    if (item.regions.length > 0) {
                        const badge = document.createElement('div');
                        badge.className = 'card-badge';
                        badge.textContent = item.regions.length;
                        card.appendChild(badge);
                    }
                    const removeBtn = document.createElement('button');
                    removeBtn.className = 'card-remove';
                    removeBtn.textContent = '×';
                    removeBtn.onclick = (e) => { e.stopPropagation();
                        removeImage(idx); };
                    card.appendChild(removeBtn);
                    card.onclick = () => switchImage(idx);
                    imageListEl.appendChild(card);
                });
            }

            document.getElementById('btnAddImages').onclick = () => document.getElementById('fileInput').click();
            document.getElementById('fileInput').onchange = (e) => { if (e.target.files.length) addImages(e.target.files);
                e.target.value = ''; };

            wrap.addEventListener('dragover', (e) => { e.preventDefault();
                wrap.classList.add('drag-over'); });
            wrap.addEventListener('dragleave', () => wrap.classList.remove('drag-over'));
            wrap.addEventListener('drop', (e) => { e.preventDefault();
                wrap.classList.remove('drag-over'); if (e.dataTransfer.files.length) addImages(e.dataTransfer.files); });
            const sidebar = document.querySelector('.sidebar');
            sidebar.addEventListener('dragover', (e) => { e.preventDefault(); });
            sidebar.addEventListener('drop', (e) => { e.preventDefault(); if (e.dataTransfer.files.length) addImages(e
                    .dataTransfer.files); });

            function getPos(e) {
                const rect = canvas.getBoundingClientRect();
                return { x: (e.clientX - rect.left) / scale, y: (e.clientY - rect.top) / scale };
            }

            // ===== 边界生成 =====
            function generateBoundaryData(shape) {
                const c = cur();
                if (!c) return;
                const w = c.img.width,
                    h = c.img.height;
                const off = document.createElement('canvas');
                off.width = w;
                off.height = h;
                const oc = off.getContext('2d');
                oc.fillStyle = '#fff';
                if (shape.type === 'rect') oc.fillRect(shape.x, shape.y, shape.w, shape.h);
                else if (shape.type === 'circle') { oc.beginPath();
                    oc.arc(shape.cx, shape.cy, shape.r, 0, Math.PI * 2);
                    oc.fill(); } else if (shape.type === 'lasso') {
                    oc.beginPath();
                    oc.moveTo(shape.points[0].x, shape.points[0].y);
                    for (let i = 1; i < shape.points.length; i++) oc.lineTo(shape.points[i].x, shape.points[i].y);
                    oc.closePath();
                    oc.fill();
                }
                const imgData = oc.getImageData(0, 0, w, h).data;
                const mask = new Uint8Array(w * h);
                for (let i = 0; i < w * h; i++) mask[i] = imgData[i * 4] > 128 ? 1 : 0;
                const overlayCanvas = document.createElement('canvas');
                overlayCanvas.width = w;
                overlayCanvas.height = h;
                const octx = overlayCanvas.getContext('2d');
                const od = octx.createImageData(w, h);
                for (let i = 0; i < w * h; i++) { if (mask[i] === 0) od.data[i * 4 + 3] = 140; }
                octx.putImageData(od, 0, 0);
                return { mask, overlayCanvas };
            }

            // ===== 控制点 =====
            function getBoundaryHandles(shape) {
                if (shape.type === 'rect') {
                    const { x, y, w, h } = shape;
                    return { tl: { x, y }, tr: { x: x + w, y }, bl: { x, y: y + h }, br: { x: x + w, y: y + h },
                        t: { x: x + w / 2, y }, b: { x: x + w / 2, y: y + h }, l: { x, y: y + h / 2 },
                        r: { x: x + w, y: y + h / 2 } };
                } else if (shape.type === 'circle') {
                    const { cx, cy, r } = shape;
                    return { top: { x: cx, y: cy - r }, bottom: { x: cx, y: cy + r }, left: { x: cx - r, y: cy },
                        right: { x: cx + r, y: cy } };
                }
                return {};
            }

            function hitTestBoundaryHandles(shape, mx, my) {
                const t = 10 / scale;
                for (const [n, p] of Object.entries(getBoundaryHandles(shape)))
                    if (Math.hypot(mx - p.x, my - p.y) < t) return n;
                return null;
            }

            function hitTestBoundaryShape(shape, mx, my) {
                if (shape.type === 'rect') return mx >= shape.x && mx <= shape.x + shape.w && my >= shape.y && my <= shape.y +
                    shape.h;
                if (shape.type === 'circle') return Math.hypot(mx - shape.cx, my - shape.cy) <= shape.r;
                return false;
            }

            function getBoundaryHandleCursor(mode) {
                const m = { tl: 'nwse-resize', br: 'nwse-resize', tr: 'nesw-resize', bl: 'nesw-resize', t: 'ns-resize',
                    b: 'ns-resize', l: 'ew-resize', r: 'ew-resize', top: 'ns-resize', bottom: 'ns-resize',
                    left: 'ew-resize', right: 'ew-resize' };
                return m[mode] || 'default';
            }

            function hitTestCutHandles(cut, mx, my) {
                const t = 10 / scale;
                if (cut.type === 'line' && cut.points.length === 2) {
                    if (Math.hypot(mx - cut.points[0].x, my - cut.points[0].y) < t) return 'p1';
                    if (Math.hypot(mx - cut.points[1].x, my - cut.points[1].y) < t) return 'p2';
                }
                return null;
            }

            function hitTestCutLine(cut, mx, my) {
                const t = 8 / scale;
                if (cut.type === 'line' && cut.points.length === 2) {
                    return distToSegment({ x: mx, y: my }, cut.points[0], cut.points[1]) < t;
                }
                return false;
            }

            // ===== 橡皮擦 =====
            function distToSegment(p, v, w) {
                const l2 = (v.x - w.x) ** 2 + (v.y - w.y) ** 2;
                if (l2 === 0) return Math.hypot(p.x - v.x, p.y - v.y);
                let t = Math.max(0, Math.min(1, ((p.x - v.x) * (w.x - v.x) + (p.y - v.y) * (w.y - v.y)) / l2));
                return Math.hypot(p.x - (v.x + t * (w.x - v.x)), p.y - (v.y + t * (w.y - v.y)));
            }

            function eraseAt(p) {
                const c = cur();
                if (!c) return;
                const threshold = 15 / scale;
                let erased = false;
                for (let i = c.cuts.length - 1; i >= 0; i--) {
                    const cut = c.cuts[i];
                    let hit = false;
                    if (cut.type === 'line') hit = distToSegment(p, cut.points[0], cut.points[1]) < threshold;
                    else if (cut.type === 'curve') { for (let j = 0; j < cut.points.length - 1; j++)
                            if (distToSegment(p, cut.points[j], cut.points[j + 1]) < threshold) { hit = true; break; } }
                    if (hit) { c.cuts.splice(i, 1);
                        erased = true; }
                }
                if (c.boundary) {
                    let bHit = false;
                    const b = c.boundary;
                    if (b.type === 'rect') {
                        const { x, y, w, h } = b;
                        bHit = distToSegment(p, { x, y }, { x: x + w, y }) < threshold || distToSegment(p, { x: x + w,
                                y }, { x: x + w, y: y + h }) < threshold || distToSegment(p, { x: x + w, y: y + h }, { x,
                                y: y + h }) < threshold || distToSegment(p, { x, y: y + h }, { x, y }) < threshold;
                    } else if (b.type === 'circle') { bHit = Math.abs(Math.hypot(p.x - b.cx, p.y - b.cy) - b.r) <
                        threshold; } else if (b.type === 'lasso') { for (let j = 0; j < b.points.length - 1; j++)
                            if (distToSegment(p, b.points[j], b.points[j + 1]) < threshold) { bHit = true; break; } if (!
                            bHit && distToSegment(p, b.points[b.points.length - 1], b.points[0]) < threshold) bHit =
                        true; }
                    if (bHit) { c.boundary = null;
                        c.boundaryMask = null;
                        c.boundaryOverlay = null;
                        c.cuts = [];
                        c.regions = [];
                        c.regionOverlay = null;
                        erased = true; }
                }
                if (erased) { redraw();
                    renderImageList();
                    setStatus('已擦除', 'ready'); }
            }

            // ===== 重绘 =====
            function redraw() {
                const c = cur();
                if (!c) return;
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.drawImage(c.img, 0, 0);
                if (c.boundaryOverlay) ctx.drawImage(c.boundaryOverlay, 0, 0);
                if (c.regionOverlay) ctx.drawImage(c.regionOverlay, 0, 0);
                if (c.boundary) {
                    ctx.save();
                    ctx.strokeStyle = 'rgba(130, 170, 150, 0.85)';
                    ctx.lineWidth = 2 / scale;
                    ctx.setLineDash([]);
                    drawShapeOutline(ctx, c.boundary);
                    ctx.restore();
                }
                ctx.save();
                ctx.strokeStyle = 'rgba(220, 140, 130, 0.85)';
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                for (const cut of c.cuts) drawCutLine(cut);
                if (currentCut) drawCutLine(currentCut);
                ctx.restore();

                if (pendingBoundary) {
                    ctx.save();
                    ctx.strokeStyle = 'rgba(130, 170, 150, 0.9)';
                    ctx.lineWidth = 2 / scale;
                    ctx.setLineDash([6 / scale, 4 / scale]);
                    drawShapeOutline(ctx, pendingBoundary);
                    ctx.restore();
                    drawBoundaryHandlesUI(pendingBoundary);
                }
                if (pendingCut) {
                    ctx.save();
                    ctx.strokeStyle = 'rgba(230, 180, 130, 0.95)';
                    ctx.lineWidth = pendingCut.width;
                    ctx.lineCap = 'round';
                    ctx.setLineDash([6 / scale, 4 / scale]);
                    if (pendingCut.type === 'line' && pendingCut.points.length === 2) {
                        ctx.beginPath();
                        ctx.moveTo(pendingCut.points[0].x, pendingCut.points[0].y);
                        ctx.lineTo(pendingCut.points[1].x, pendingCut.points[1].y);
                        ctx.stroke();
                    }
                    ctx.restore();
                    drawCutHandlesUI(pendingCut);
                }
            }

            function drawShapeOutline(c, shape) {
                if (shape.type === 'rect') c.strokeRect(shape.x, shape.y, shape.w, shape.h);
                else if (shape.type === 'circle') { c.beginPath();
                    c.arc(shape.cx, shape.cy, shape.r, 0, Math.PI * 2);
                    c.stroke(); } else if (shape.type === 'lasso' && shape.points.length > 1) { c.beginPath();
                    c.moveTo(shape.points[0].x, shape.points[0].y); for (let i = 1; i < shape.points.length; i++) c
                        .lineTo(shape.points[i].x, shape.points[i].y);
                    c.closePath();
                    c.stroke(); }
            }

            function drawCutLine(cut) {
                ctx.lineWidth = cut.width;
                if (cut.type === 'line' && cut.points.length === 2) { ctx.beginPath();
                    ctx.moveTo(cut.points[0].x, cut.points[0].y);
                    ctx.lineTo(cut.points[1].x, cut.points[1].y);
                    ctx.stroke(); } else if (cut.type === 'curve' && cut.points.length > 1) { ctx.beginPath();
                    ctx.moveTo(cut.points[0].x, cut.points[0].y); for (let i = 1; i < cut.points.length; i++) ctx
                        .lineTo(cut.points[i].x, cut.points[i].y);
                    ctx.stroke(); }
            }

            function drawBoundaryHandlesUI(shape) {
                const hs = 8 / scale;
                ctx.fillStyle = '#fff';
                ctx.strokeStyle = 'rgba(130, 170, 150, 0.7)';
                ctx.lineWidth = 1.5 / scale;
                ctx.setLineDash([]);
                for (const p of Object.values(getBoundaryHandles(shape))) {
                    ctx.fillRect(p.x - hs / 2, p.y - hs / 2, hs, hs);
                    ctx.strokeRect(p.x - hs / 2, p.y - hs / 2, hs, hs);
                }
            }

            function drawCutHandlesUI(cut) {
                if (cut.type !== 'line' || cut.points.length !== 2) return;
                const hs = 10 / scale;
                ctx.setLineDash([]);
                for (const p of cut.points) {
                    ctx.fillStyle = 'rgba(230, 180, 130, 0.9)';
                    ctx.strokeStyle = '#fff';
                    ctx.lineWidth = 2 / scale;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, hs / 2, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.stroke();
                }
            }

            // ===== 鼠标事件 =====
            window.addEventListener('mousedown', (e) => {
                if (e.target !== canvas) return;
                if (e.button !== 0 || !cur()) return;
                if (isSpaceDown) {
                    isPanning = true;
                    panStartX = e.clientX;
                    panStartY = e.clientY;
                    scrollStartLeft = wrap.scrollLeft;
                    scrollStartTop = wrap.scrollTop;
                    canvas.classList.add('panning-active');
                    e.preventDefault();
                    return;
                }
                const p = getPos(e);
                const c = cur();
                if (tool === 'eraser') { eraseAt(p); return; }

                if (pendingBoundary) {
                    const handle = hitTestBoundaryHandles(pendingBoundary, p.x, p.y);
                    if (handle) dragMode = 'b_' + handle;
                    else if (hitTestBoundaryShape(pendingBoundary, p.x, p.y)) dragMode = 'b_move';
                    else { cancelPending(); return; }
                    dragStartMouse = p;
                    dragStartShape = JSON.parse(JSON.stringify(pendingBoundary));
                    return;
                }

                if (pendingCut) {
                    const handle = hitTestCutHandles(pendingCut, p.x, p.y);
                    if (handle) dragMode = 'c_' + handle;
                    else if (hitTestCutLine(pendingCut, p.x, p.y)) dragMode = 'c_move';
                    else { cancelPending(); return; }
                    dragStartMouse = p;
                    dragStartShape = JSON.parse(JSON.stringify(pendingCut));
                    return;
                }

                const isBT = ['rect', 'circle', 'lasso'].includes(tool);
                const isLT = tool === 'line';
                const isCT = tool === 'curve';

                if (isBT) {
                    if (c.boundary && tool !== 'lasso' && hitTestBoundaryShape(c.boundary, p.x, p.y)) {
                        pendingBoundary = JSON.parse(JSON.stringify(c.boundary));
                        dragMode = 'b_move';
                        dragStartMouse = p;
                        dragStartShape = JSON.parse(JSON.stringify(pendingBoundary));
                        showFloatPanel('boundary');
                        return;
                    }
                    if (tool === 'rect') pendingBoundary = { type: 'rect', x: p.x, y: p.y, w: 0, h: 0 };
                    else if (tool === 'circle') pendingBoundary = { type: 'circle', cx: p.x, cy: p.y, r: 0 };
                    else if (tool === 'lasso') pendingBoundary = { type: 'lasso', points: [p] };
                    if (tool !== 'lasso') { dragMode = tool === 'rect' ? 'b_br' : 'b_right';
                        dragStartMouse = p;
                        dragStartShape = JSON.parse(JSON.stringify(pendingBoundary)); }
                    showFloatPanel('boundary');
                    return;
                }

                if (isLT) {
                    if (!c.boundary) { alert('请先使用「定蛋糕」工具框选范围！'); return; }
                    pendingCut = { type: 'line', points: [p, { ...p }], width: lineWidth };
                    dragMode = 'c_p2';
                    dragStartMouse = p;
                    dragStartShape = JSON.parse(JSON.stringify(pendingCut));
                    showFloatPanel('cut');
                    return;
                }

                if (isCT) {
                    if (!c.boundary) { alert('请先使用「定蛋糕」工具框选范围！'); return; }
                    currentCut = { type: 'curve', points: [p], width: lineWidth };
                }
            });

            window.addEventListener('mousemove', (e) => {
                if (!cur()) return;
                if (isPanning) { wrap.scrollLeft = scrollStartLeft - (e.clientX - panStartX);
                    wrap.scrollTop = scrollStartTop - (e.clientY - panStartY); return; }
                const p = getPos(e);

                if (tool === 'eraser' && (e.buttons & 1)) { eraseAt(p); return; }

                if (pendingBoundary && dragMode && dragMode.startsWith('b_')) {
                    const mode = dragMode.substring(2);
                    if (pendingBoundary.type === 'rect') updateRectDrag(p, mode);
                    else if (pendingBoundary.type === 'circle') updateCircleDrag(p, mode);
                    redraw();
                    return;
                }

                if (pendingCut && dragMode && dragMode.startsWith('c_')) {
                    const mode = dragMode.substring(2);
                    updateCutDrag(p, mode);
                    redraw();
                    return;
                }

                if (pendingBoundary && pendingBoundary.type !== 'lasso' && !dragMode) {
                    if (pendingBoundary.type === 'rect') updateRectDrag(p, dragMode || 'br');
                    else if (pendingBoundary.type === 'circle') updateCircleDrag(p, dragMode || 'right');
                    redraw();
                    return;
                }

                if (pendingBoundary && pendingBoundary.type === 'lasso') {
                    const last = pendingBoundary.points[pendingBoundary.points.length - 1];
                    if (Math.hypot(p.x - last.x, p.y - last.y) > 2) pendingBoundary.points.push(p);
                    redraw();
                    return;
                }

                if (pendingBoundary && pendingBoundary.type !== 'lasso' && !dragMode) {
                    const h = hitTestBoundaryHandles(pendingBoundary, p.x, p.y);
                    canvas.style.cursor = h ? getBoundaryHandleCursor(h) : (hitTestBoundaryShape(pendingBoundary, p.x,
                        p.y) ? 'move' : 'crosshair');
                    return;
                }

                if (pendingCut && !dragMode) {
                    const h = hitTestCutHandles(pendingCut, p.x, p.y);
                    if (h) canvas.style.cursor = 'crosshair';
                    else if (hitTestCutLine(pendingCut, p.x, p.y)) canvas.style.cursor = 'move';
                    else canvas.style.cursor = 'crosshair';
                    return;
                }

                if (currentCut) {
                    if (currentCut.type === 'curve') { const last = currentCut.points[currentCut.points.length - 1]; if (
                            Math.hypot(p.x - last.x, p.y - last.y) > 2) currentCut.points.push(p); }
                    redraw();
                }
            });

            window.addEventListener('mouseup', (e) => {
                if (e.button !== 0 || !cur()) return;
                if (isPanning) { isPanning = false;
                    canvas.classList.remove('panning-active'); if (isSpaceDown) canvas.classList.add('panning'); return; }

                if (dragMode) {
                    dragMode = null;
                    dragStartMouse = null;
                    dragStartShape = null;
                    if (pendingBoundary) {
                        if (pendingBoundary.type === 'rect' && (pendingBoundary.w < 5 || pendingBoundary.h < 5))
                            cancelPending();
                        if (pendingBoundary.type === 'circle' && pendingBoundary.r < 5) cancelPending();
                    }
                    if (pendingCut) {
                        const [p1, p2] = pendingCut.points;
                        if (Math.hypot(p2.x - p1.x, p2.y - p1.y) < 5) cancelPending();
                    }
                    return;
                }

                if (pendingBoundary && pendingBoundary.type === 'lasso') {
                    if (pendingBoundary.points.length > 5) confirmPending();
                    else cancelPending();
                    return;
                }

                if (currentCut) {
                    const c = cur();
                    if (currentCut.type === 'curve') { if (currentCut.points.length > 2) c.cuts.push(currentCut); }
                    currentCut = null;
                    c.regions = [];
                    c.regionOverlay = null;
                    redraw();
                }
            });

            function updateRectDrag(p, mode) {
                const dx = p.x - dragStartMouse.x,
                    dy = p.y - dragStartMouse.y;
                let { x, y, w, h } = dragStartShape;
                if (mode === 'move') { x += dx;
                    y += dy; } else if (mode === 'tl') { x += dx;
                    y += dy;
                    w -= dx;
                    h -= dy; } else if (mode === 'tr') { y += dy;
                    w += dx;
                    h -= dy; } else if (mode === 'bl') { x += dx;
                    w -= dx;
                    h += dy; } else if (mode === 'br') { w += dx;
                    h += dy; } else if (mode === 't') { y += dy;
                    h -= dy; } else if (mode === 'b') { h += dy; } else if (mode === 'l') { x += dx;
                    w -= dx; } else if (mode === 'r') { w += dx; }
                if (w < 0) { x += w;
                    w = -w; } if (h < 0) { y += h;
                    h = -h; }
                pendingBoundary.x = x;
                pendingBoundary.y = y;
                pendingBoundary.w = w;
                pendingBoundary.h = h;
            }

            function updateCircleDrag(p, mode) {
                if (mode === 'move') { pendingBoundary.cx = dragStartShape.cx + (p.x - dragStartMouse.x);
                    pendingBoundary.cy = dragStartShape.cy + (p.y - dragStartMouse.y); } else { pendingBoundary.r = Math
                        .max(5, Math.hypot(p.x - dragStartShape.cx, p.y - dragStartShape.cy)); }
            }

            function updateCutDrag(p, mode) {
                if (mode === 'p1') {
                    pendingCut.points[0] = { ...p };
                } else if (mode === 'p2') {
                    pendingCut.points[1] = { ...p };
                } else if (mode === 'move') {
                    const dx = p.x - dragStartMouse.x;
                    const dy = p.y - dragStartMouse.y;
                    pendingCut.points[0] = { x: dragStartShape.points[0].x + dx, y: dragStartShape.points[0].y + dy };
                    pendingCut.points[1] = { x: dragStartShape.points[1].x + dx, y: dragStartShape.points[1].y + dy };
                }
            }

            // ===== 确认/取消 =====
            function confirmPending() {
                const c = cur();
                if (!c) return;

                if (pendingBoundary) {
                    // ---- 矩形检查 ----
                    if (pendingBoundary.type === 'rect') {
                        if (pendingBoundary.w < 5 || pendingBoundary.h < 5) {
                            alert('⚠️ 矩形区域太小（宽或高小于 5 像素），请拖动控制点放大后再确认。');
                            return; // 保留 pendingBoundary，不取消
                        }
                    }
                    // ---- 圆形检查 ----
                    else if (pendingBoundary.type === 'circle') {
                        if (pendingBoundary.r < 5) {
                            alert('⚠️ 圆形半径太小（小于 5 像素），请拖动控制点放大后再确认。');
                            return;
                        }
                    }
                    // ---- 套索检查 ----
                    else if (pendingBoundary.type === 'lasso') {
                        if (pendingBoundary.points.length < 5) {
                            alert('⚠️ 套索路径太短（少于 5 个点），请继续绘制完整边界。');
                            return;
                        }
                    }

                    // ---- 确认边界 ----
                    c.boundary = pendingBoundary;
                    const data = generateBoundaryData(c.boundary);
                    c.boundaryMask = data.mask;
                    c.boundaryOverlay = data.overlayCanvas;
                    c.cuts = [];
                    c.regions = [];
                    c.regionOverlay = null;
                    pendingBoundary = null;
                    hideFloatPanel();
                    canvas.style.cursor = 'crosshair';
                    redraw();
                    renderImageList();
                    setStatus('✅ 边界已确认！可画切割线或执行分割', 'ready');
                    return;
                }

                if (pendingCut) {
                    const [p1, p2] = pendingCut.points;
                    if (Math.hypot(p2.x - p1.x, p2.y - p1.y) < 5) {
                        alert('⚠️ 切割线太短，请拉长后再确认。');
                        return;
                    }
                    c.cuts.push({ ...pendingCut });
                    c.regions = [];
                    c.regionOverlay = null;
                    pendingCut = null;
                    hideFloatPanel();
                    canvas.style.cursor = 'crosshair';
                    redraw();
                    renderImageList();
                    setStatus(`✅ 已确认切割线，当前共 ${c.cuts.length} 条`, 'ready');
                }
            }

            function cancelPending() {
                pendingBoundary = null;
                pendingCut = null;
                dragMode = null;
                hideFloatPanel();
                canvas.style.cursor = 'crosshair';
                redraw();
            }
            document.getElementById('btnConfirmShape').onclick = confirmPending;
            document.getElementById('btnCancelShape').onclick = cancelPending;

            document.getElementById('btnClearAll').onclick = () => {
                const c = cur();
                if (!c) return;
                c.boundary = null;
                c.boundaryMask = null;
                c.boundaryOverlay = null;
                c.cuts = [];
                c.regions = [];
                c.regionOverlay = null;
                pendingBoundary = null;
                pendingCut = null;
                currentCut = null;
                hideFloatPanel();
                canvas.style.cursor = 'crosshair';
                redraw();
                renderImageList();
                setStatus('已清空当前图片的所有内容', 'ready');
            };

            const toolBtns = {
                rect: document.getElementById('btnRect'),
                circle: document.getElementById('btnCircle'),
                lasso: document.getElementById('btnLasso'),
                line: document.getElementById('btnLine'),
                curve: document.getElementById('btnCurve'),
                eraser: document.getElementById('btnEraser')
            };

            function setTool(t) {
                if (pendingBoundary || pendingCut) cancelPending();
                tool = t;
                currentCut = null;
                Object.values(toolBtns).forEach(b => b.classList.remove('active'));
                toolBtns[t].classList.add('active');
                canvas.style.cursor = (t === 'eraser') ? 'cell' : 'crosshair';
            }
            Object.entries(toolBtns).forEach(([n, b]) => b.onclick = () => setTool(n));
            const lineWidthInput = document.getElementById('lineWidth'),
                lineWidthVal = document.getElementById('lineWidthVal');
            lineWidthInput.oninput = () => { lineWidth = parseInt(lineWidthInput.value);
                lineWidthVal.textContent = lineWidth; };

            function undoCut() {
                if (pendingBoundary || pendingCut) return cancelPending();
                const c = cur();
                if (!c) return;
                if (c.cuts.length > 0) { c.cuts.pop();
                    c.regions = [];
                    c.regionOverlay = null;
                    redraw();
                    renderImageList();
                    setStatus(`剩余 ${c.cuts.length} 条切割线`, 'ready'); }
            }
            document.getElementById('btnUndoCut').onclick = undoCut;

            document.getElementById('btnCut').onclick = () => {
                if (pendingBoundary || pendingCut) { alert('请先确认或取消当前正在调整的内容'); return; }
                const c = cur();
                if (!c) return;
                if (!c.boundary) { alert('请先使用「定蛋糕」工具框选范围！'); return; }
                performSegmentation(c);
                renderImageList();
            };

            function performSegmentation(c) {
                setStatus('正在计算分割...', 'working');
                const w = c.img.width,
                    h = c.img.height;
                const cutMap = new Uint8Array(w * h);
                for (let i = 0; i < w * h; i++) if (c.boundaryMask[i] === 0) cutMap[i] = 1;
                for (const cut of c.cuts) {
                    if (cut.type === 'line') drawLineOnMap(cutMap, w, h, cut.points[0], cut.points[1], cut.width);
                    else if (cut.type === 'curve')
                        for (let i = 0; i < cut.points.length - 1; i++) drawLineOnMap(cutMap, w, h, cut.points[i], cut
                            .points[i + 1], cut.width);
                }
                c.regions = [];
                const visited = new Uint8Array(w * h);
                let regionId = 0;
                for (let y = 0; y < h; y++)
                    for (let x = 0; x < w; x++) {
                        const idx = y * w + x;
                        if (cutMap[idx] === 0 && visited[idx] === 0) {
                            const pixels = [];
                            floodFill(cutMap, visited, w, h, x, y, pixels);
                            if (pixels.length > 50) {
                                regionId++;
                                const hue = (regionId * 137.508) % 360;
                                const rgb = hslToRgb(hue, 70, 60);
                                c.regions.push({ id: regionId, pixels, color: `${rgb[0]},${rgb[1]},${rgb[2]}` });
                            }
                        }
                    }
                generateRegionOverlay(c, w, h);
                redraw();
                if (c.cuts.length === 0) setStatus('已提取整个蛋糕区域（1块），可导出', 'ready');
                else setStatus(`分割完成！共 ${c.regions.length} 个内部小块`, 'ready');
            }

            function generateRegionOverlay(c, w, h) {
                c.regionOverlay = document.createElement('canvas');
                c.regionOverlay.width = w;
                c.regionOverlay.height = h;
                const roc = c.regionOverlay.getContext('2d');
                const roData = roc.createImageData(w, h);
                for (const region of c.regions) {
                    const [r, g, b] = region.color.split(',').map(Number);
                    for (const p of region.pixels) { const idx = (p.y * w + p.x) * 4;
                        roData.data[idx] = r;
                        roData.data[idx + 1] = g;
                        roData.data[idx + 2] = b;
                        roData.data[idx + 3] = 90; }
                }
                roc.putImageData(roData, 0, 0);
            }

            function hslToRgb(h, s, l) { s /= 100;
                l /= 100;
                const k = n => (n + h / 30) % 12;
                const a = s * Math.min(l, 1 - l);
                const f = n => l - a * Math.max(-1, Math.min(k(n) - 3, Math.min(9 - k(n), 1)));
                return [Math.round(255 * f(0)), Math.round(255 * f(8)), Math.round(255 * f(4))]; }

            function drawLineOnMap(cutMap, w, h, p1, p2, width) {
                const x0 = Math.round(p1.x),
                    y0 = Math.round(p1.y),
                    x1 = Math.round(p2.x),
                    y1 = Math.round(p2.y);
                const dx = Math.abs(x1 - x0),
                    dy = Math.abs(y1 - y0),
                    sx = x0 < x1 ? 1 : -1,
                    sy = y0 < y1 ? 1 : -1;
                let err = dx - dy;
                const radius = Math.floor(width / 2);
                let x = x0,
                    y = y0;
                while (true) {
                    for (let oy = -radius; oy <= radius; oy++)
                        for (let ox = -radius; ox <= radius; ox++)
                            if (ox * ox + oy * oy <= radius * radius) { const px = x + ox,
                                    py = y + oy; if (px >= 0 && px < w && py >= 0 && py < h) cutMap[py * w + px] =
                                    1; }
                    if (x === x1 && y === y1) break;
                    const e2 = 2 * err;
                    if (e2 > -dy) { err -= dy;
                        x += sx; }
                    if (e2 < dx) { err += dx;
                        y += sy; }
                }
            }

            function floodFill(cutMap, visited, w, h, startX, startY, pixels) {
                const stack = [
                    [startX, startY]
                ];
                while (stack.length > 0) {
                    const [x, y] = stack.pop();
                    const idx = y * w + x;
                    if (x < 0 || x >= w || y < 0 || y >= h) continue;
                    if (cutMap[idx] === 1 || visited[idx] === 1) continue;
                    visited[idx] = 1;
                    pixels.push({ x, y });
                    stack.push([x + 1, y], [x - 1, y], [x, y + 1], [x, y - 1]);
                }
            }

            // ===== 直接导出 =====
            document.getElementById('btnExportDirect').onclick = async () => {
                let totalRegions = 0;
                for (const item of images) totalRegions += item.regions.length;

                if (totalRegions === 0) {
                    const hasUnsegmented = images.some(item => item.boundary && item.regions.length === 0);
                    if (hasUnsegmented) { alert('有些图片已划定边界但还未执行分割，请先切换到对应图片并点击「执行分割」。'); return; }
                    alert('没有任何可导出的区域，请先划定边界并执行分割。');
                    return;
                }

                const overlay = document.getElementById('exportOverlay');
                overlay.classList.add('show');
                exportIcon.textContent = '⬇';
                exportTitle.textContent = '正在导出...';
                exportSub.textContent = '请稍候';
                progressFill.style.width = '0%';
                await new Promise(r => setTimeout(r, 100));

                let exported = 0;
                for (const item of images) {
                    if (item.regions.length === 0) continue;
                    const baseName = item.name.replace(/\.[^.]+$/, '').replace(/[\/\\:*?"<>|]/g, '_');

                    canvas.width = item.img.width;
                    canvas.height = item.img.height;
                    ctx.drawImage(item.img, 0, 0);

                    for (let i = 0; i < item.regions.length; i++) {
                        const region = item.regions[i];
                        exportSub.textContent = `${item.name} (${i+1}/${item.regions.length})`;
                        progressFill.style.width = `${Math.round((exported / totalRegions) * 100)}%`;
                        await new Promise(r => setTimeout(r, 30));

                        let minX = Infinity,
                            minY = Infinity,
                            maxX = -Infinity,
                            maxY = -Infinity;
                        for (const p of region.pixels) {
                            if (p.x < minX) minX = p.x;
                            if (p.y < minY) minY = p.y;
                            if (p.x > maxX) maxX = p.x;
                            if (p.y > maxY) maxY = p.y;
                        }
                        const w = maxX - minX + 1,
                            h = maxY - minY + 1;

                        const off = document.createElement('canvas');
                        off.width = w;
                        off.height = h;
                        const oc = off.getContext('2d');
                        const imgData = ctx.getImageData(minX, minY, w, h);
                        const outData = oc.createImageData(w, h);
                        const pixelSet = new Set(region.pixels.map(p => `${p.x - minX},${p.y - minY}`));

                        for (let y = 0; y < h; y++) {
                            for (let x = 0; x < w; x++) {
                                const di = (y * w + x) * 4;
                                if (pixelSet.has(`${x},${y}`)) {
                                    outData.data[di] = imgData.data[di];
                                    outData.data[di + 1] = imgData.data[di + 1];
                                    outData.data[di + 2] = imgData.data[di + 2];
                                    outData.data[di + 3] = 255;
                                } else {
                                    outData.data[di + 3] = 0;
                                }
                            }
                        }
                        oc.putImageData(outData, 0, 0);

                        const link = document.createElement('a');
                        link.download = `${baseName}_block_${String(i+1).padStart(3,'0')}.png`;
                        link.href = off.toDataURL('image/png');
                        link.click();

                        exported++;
                        await new Promise(r => setTimeout(r, 150));
                    }
                }

                const c = cur();
                if (c) { canvas.width = c.img.width;
                    canvas.height = c.img.height; }

                progressFill.style.width = '100%';
                exportTitle.textContent = '✅ 导出完成！';
                exportSub.textContent = `共 ${exported} 个文件`;
                await new Promise(r => setTimeout(r, 1200));
                overlay.classList.remove('show');
                redraw();
                setStatus(`成功导出 ${exported} 个高清透明背景 PNG`, 'ready');
            };

            // ===== ZIP 打包 =====
            document.getElementById('btnExportZip').onclick = async () => {
                let totalRegions = 0;
                for (const item of images) totalRegions += item.regions.length;

                if (totalRegions === 0) {
                    const hasUnsegmented = images.some(item => item.boundary && item.regions.length === 0);
                    if (hasUnsegmented) { alert('有些图片已划定边界但还未执行分割，请先切换到对应图片并点击「执行分割」。'); return; }
                    alert('没有任何可导出的区域，请先划定边界并执行分割。');
                    return;
                }

                const overlay = document.getElementById('exportOverlay');
                overlay.classList.add('show');
                exportIcon.textContent = '📎';
                exportTitle.textContent = '正在打包 ZIP...';
                exportSub.textContent = '请稍候';
                progressFill.style.width = '0%';
                await new Promise(r => setTimeout(r, 100));

                const zip = new JSZip();
                let exported = 0;

                for (const item of images) {
                    if (item.regions.length === 0) continue;
                    const folderName = item.name.replace(/\.[^.]+$/, '').replace(/[\/\\:*?"<>|]/g, '_');
                    const folder = zip.folder(folderName);

                    canvas.width = item.img.width;
                    canvas.height = item.img.height;
                    ctx.drawImage(item.img, 0, 0);

                    for (let i = 0; i < item.regions.length; i++) {
                        const region = item.regions[i];
                        exportSub.textContent = `${item.name} (${i+1}/${item.regions.length})`;
                        progressFill.style.width = `${Math.round((exported / totalRegions) * 100)}%`;
                        await new Promise(r => setTimeout(r, 20));

                        let minX = Infinity,
