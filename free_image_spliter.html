                            minY = Infinity,
                            maxX = -Infinity,
                            maxY = -Infinity;
                        for (const p of region.pixels) {
                            if (p.x < minX) minX = p.x;
                            if (p.y < minY) minY = p.y;
                            if (p.x > maxX) maxX = p.x;
                            if (p.y > maxY) maxY = p.y;
                        }
                        const w = maxX - minX + 1,
                            h = maxY - minY + 1;

                        const off = document.createElement('canvas');
                        off.width = w;
                        off.height = h;
                        const oc = off.getContext('2d');
                        const imgData = ctx.getImageData(minX, minY, w, h);
                        const outData = oc.createImageData(w, h);
                        const pixelSet = new Set(region.pixels.map(p => `${p.x - minX},${p.y - minY}`));

                        for (let y = 0; y < h; y++) {
                            for (let x = 0; x < w; x++) {
                                const di = (y * w + x) * 4;
                                if (pixelSet.has(`${x},${y}`)) {
                                    outData.data[di] = imgData.data[di];
                                    outData.data[di + 1] = imgData.data[di + 1];
                                    outData.data[di + 2] = imgData.data[di + 2];
                                    outData.data[di + 3] = 255;
                                } else {
                                    outData.data[di + 3] = 0;
                                }
                            }
                        }
                        oc.putImageData(outData, 0, 0);

                        const dataUrl = off.toDataURL('image/png');
                        const base64 = dataUrl.split(',')[1];
                        folder.file(`block_${String(i+1).padStart(3,'0')}.png`, base64, { base64: true });

                        exported++;
                    }
                }

                const c = cur();
                if (c) { canvas.width = c.img.width;
                    canvas.height = c.img.height; }

                exportSub.textContent = '正在生成 ZIP...';
                progressFill.style.width = '100%';
                await new Promise(r => setTimeout(r, 100));

                try {
                    const blob = await zip.generateAsync({ type: 'blob', compression: 'DEFLATE',
                        compressionOptions: { level: 6 } }, (metadata) => {
                        progressFill.style.width = `${Math.round(metadata.percent)}%`;
                    });

                    const url = URL.createObjectURL(blob);
                    const link = document.createElement('a');
                    const now = new Date();
                    const timeStr =
                        `${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}_${String(now.getHours()).padStart(2,'0')}${String(now.getMinutes()).padStart(2,'0')}`;
                    link.download = `切割结果_${timeStr}.zip`;
                    link.href = url;
                    link.click();

                    setTimeout(() => URL.revokeObjectURL(url), 5000);

                    exportTitle.textContent = '✅ 导出完成！';
                    exportSub.textContent = `共 ${exported} 个文件`;
                    await new Promise(r => setTimeout(r, 1200));
                } catch (err) {
                    exportTitle.textContent = '❌ 导出失败';
                    exportSub.textContent = err.message;
                    await new Promise(r => setTimeout(r, 2000));
                }

                overlay.classList.remove('show');
                redraw();
                setStatus(`成功打包导出 ${exported} 个高清透明背景 PNG 到 ZIP`, 'ready');
            };

            // 首次加载提示
            setStatus('就绪 · 点击「添加图片」或拖放图片开始', 'ready');
        })();
    </script>
</body>
</html>
